<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none" role="img" aria-label="WeThinkTech Global Limited">
  <!-- Lightbulb icon -->
  <!-- Gold arc segments at top -->
  <g>
    <!-- Outer arc -->
    <path d="M14 28 A16 16 0 0 1 46 28" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <!-- Mid arc -->
    <path d="M17.5 33 A12 12 0 0 1 42.5 33" stroke="#e8a000" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Inner arc -->
    <path d="M21 37.5 A9 9 0 0 1 39 37.5" stroke="#f5c518" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Bulb body -->
  <path d="M22 42 Q22 50 26 52 L26 55 Q26 57 30 57 Q34 57 34 55 L34 52 Q38 50 38 42 Q38 34 30 34 Q22 34 22 42Z" fill="#2d8a4e"/>
  <!-- Bulb base/filament band -->
  <rect x="26" y="53" width="8" height="2" rx="1" fill="#0d4a28"/>
  <rect x="27" y="56" width="6" height="2" rx="1" fill="#0d4a28"/>

  <!-- Highlight on bulb -->
  <ellipse cx="27" cy="40" rx="2.5" ry="3.5" fill="#4db870" opacity="0.5"/>

  <!-- "WeThinkTech" wordmark -->
  <text x="56" y="30" font-family="Sora, system-ui, sans-serif" font-size="17" font-weight="700" letter-spacing="-0.5" fill="#1a6b3c">WeThinkTech</text>
  <!-- "Global Limited" sub-text -->
  <text x="57" y="46" font-family="Inter, system-ui, sans-serif" font-size="10.5" font-weight="400" letter-spacing="0.5" fill="#2d8a4e">GLOBAL LIMITED</text>
</svg>
